<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .locked-container{
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .locked-card{
            background: #fff;
            border-radius: 18px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 6px solid #dc3545;
        }

        .lock-icon{
            width: 110px;
            height: 110px;
            background: #ffe5e8;
            color:rgb(11, 39, 11);
            margin: 0 auto 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
        }

        h1{
            color:rgb(11, 39, 11);
            font-size: 34px;
            margin-bottom: 15px;
        }

        .message{
            color: #666;
            font-size: 17px;
            line-height: 28px;
            margin-bottom: 30px;
        }

        .status-badge{
            display: inline-block;
            background:rgb(11, 39, 11);
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .reason-box{
            background: #fff5f5;
            border: 1px solid #ffccd2;
            padding: 18px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .reason-title{
            color:rgb(11, 39, 11);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .reason-text{
            color: #555;
            line-height: 24px;
        }

        .support-btn{
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background:rgb(11, 39, 11);
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: bold;
        }

        .support-btn:hover{
            background:rgb(11, 39, 11);
        }

    </style>

</head>
<body>

    <div class="locked-container">

        <div class="locked-card">

            <div class="lock-icon">
                🔒
            </div>

            <h1>Account Locked</h1>

            <p class="message">
                Your agent account has been rejected by the admin.
                You currently cannot access the dashboard or system features.
            </p>

            <div class="status-badge">
                ACCOUNT LOCKED
            </div>

            <div class="reason-box">

                <div class="reason-title">
                    Rejection Reason
                </div>

                <div class="reason-text">
                    {{ request.user.agent_profile.rejection_reason|default:"Your KYC documents were invalid or incomplete." }}
                </div>

            </div>

            <a href="#" class="support-btn">
                Contact Support
            </a>
 <button class="btn-dashboard">
          <li><a href="{% url 'logout' %}" style="color: #d9534f !important;">Logout</a></li>
        </button>
        </div>
        

    </div>

</body>
</html>
