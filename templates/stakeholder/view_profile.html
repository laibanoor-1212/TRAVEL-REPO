{% extends 'stakeholder/dashboard_layout2.html' %}
{% block content %}
<style>
    .profile-card { background: white; padding: 30px; border-radius: 12px; box-shadow: var(--shadow); max-width: 900px; margin: 0 auto; }
    .status-banner { padding: 10px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
    .verified { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .pending { background: #fff3e0; color: #ef6c00; border: 1px solid #ffe0b2; }
    .form-control:disabled { background: #f8f9fa; border: 1px solid transparent; color: #333; cursor: not-allowed; }
    .btn-hidden { display: none; }
    .doc-preview { font-size: 14px; padding: 10px; background: #f1f1f1; border-radius: 5px; margin-top: 5px; }
</style>

<div class="profile-card">
    <div class="status-banner {% if profile.is_verified %}verified{% else %}pending{% endif %}">
        <i class="fas {% if profile.is_verified %}fa-check-circle{% else %}fa-clock{% endif %}"></i>
        <span>Status: <strong>{% if profile.is_verified %}Verified Agent{% else %}Pending Approval{% endif %}</strong></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-building text-success"></i> {{ profile.agency_name }}</h3>
        <button id="editBtn" onclick="enableEditing()" class="btn-submit" style="background: var(--primary-green);">
            <i class="fas fa-edit"></i> Edit Profile
        </button>
    </div>

    <form action="" method="POST" enctype="multipart/form-data" id="profileForm">
        {% csrf_token %}
        <div class="row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Agency Name</label>
                <input type="text" name="agency_name" value="{{ profile.agency_name }}" class="form-control" disabled>
            </div>
             <div class="form-group">
                <label>Email</label>
                <input type="email" name="agency_email" class="form-control" value="{{ profile.agency_email }}" disabled>
            </div>
            <div class="form-group">
                <label>License Number</label>
                <input type="text" value="{{ profile.license_number }}" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label>NTN Number</label>
                <input type="text" value="{{ profile.ntn_number }}" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone_number" value="{{ profile.phone_number }}" class="form-control" disabled>
            </div>
        </div>

        <div class="form-group mt-3">
            <label>Office Address</label>
            <textarea name="address" class="form-control" rows="3" disabled>{{ profile.address }}</textarea>
        </div>

        <div class="section-title mt-4" style="font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px;">Uploaded Documents</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 10px;">
            <div class="doc-preview">
                <label>License</label><br>
                <a href="{{ profile.license_doc.url }}" target="_blank"><i class="fas fa-file-pdf"></i> View File</a>
                <input type="file" name="license_doc" class="btn-hidden mt-2">
            </div>
            <div class="doc-preview">
                <label>CNIC</label><br>
                <a href="{{ profile.cnic_doc.url }}" target="_blank"><i class="fas fa-id-card"></i> View File</a>
                <input type="file" name="cnic_doc" class="btn-hidden mt-2">
            </div>
            <div class="doc-preview">
                <label>NTN Certificate</label><br>
                <a href="{{ profile.ntn_doc.url }}" target="_blank"><i class="fas fa-file-contract"></i> View File</a>
            </div>
        </div>

        <div id="saveGroup" class="btn-hidden mt-4">
            <button type="submit" class="btn-submit" style="background: var(--success-green);">Save Changes</button>
            <button type="button" onclick="location.reload()" class="btn-submit" style="background: var(--danger);">Cancel</button>
        </div>
    </form>
</div>

<script>
    function enableEditing() {
        const inputs = document.querySelectorAll('#profileForm input, #profileForm textarea');
        inputs.forEach(input => {
            if (!input.classList.contains('static-field')) {
                input.disabled = false;
                input.style.border = "1px solid #ddd";
            }
        });
        document.getElementById('editBtn').style.display = 'none';
        document.getElementById('saveGroup').classList.remove('btn-hidden');
        document.querySelectorAll('.btn-hidden').forEach(el => el.classList.remove('btn-hidden'));
    }
</script>
{% endblock %}
