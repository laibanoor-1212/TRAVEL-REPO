<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Approved</title>
    <link rel="stylesheet" href="{% static 'css/approve_agent.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="card">
    <div class="success-icon-container">
        <i class="fas fa-circle-check"></i>
    </div>
    
    <h2>Congratulations!</h2>
    <p>Your agent profile and documents have been <strong>successfully approved</strong>. You can now access all features of the portal.</p>

    <div class="status-badge">
        <span class="dot"></span> Account Status: Active
    </div>

    <div class="action-buttons">
        <button class="btn-dashboard">
            Go to Login <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</div>

</body>
</html>
